<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>GS-PL-T02 어노잉 소크라테스: 주장글쓰기 에디션 — 시스템 설계서 (SDS) v3.0</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@300;400;500;600;700&family=Noto+Serif+KR:wght@400;600;700&display=swap" rel="stylesheet">
<style>
/* ═══════════════════════════════════════
   RESET & VARIABLES
   ═══════════════════════════════════════ */
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
html{scroll-behavior:smooth}
:root{
  --doc-bg:#F5F0E8;--doc-surface:#FDFCF9;--doc-text:#2A2520;--doc-muted:#8A8478;
  --doc-accent:#b45309;--doc-border:#E0D8CC;--doc-gap-bg:#FFF8E1;--doc-gap-border:#F9A825;
  --app-bg:#faf9f6;--app-surface:#FFFFFF;--app-primary:#2c5282;--app-primary-fg:#FFFFFF;
  --app-primary-10:rgba(44,82,130,0.08);--app-primary-light:#bee3f8;
  --app-accent:#b45309;--app-accent-10:rgba(180,83,9,0.08);
  --app-text:#1A1814;--app-text-2:#6B7280;--app-text-3:#9CA3AF;
  --app-border:#E5DED4;--app-divider:#F0EBE3;--app-error:#DC2626;--app-success:#16A34A;
  --app-radius:10px;--app-radius-sm:6px;--app-radius-full:999px;
  --font-sans:'Noto Sans KR',-apple-system,'Malgun Gothic',sans-serif;
  --font-serif:'Noto Serif KR',Georgia,serif;
}

/* ═══════════════════════════════════════
   DOCUMENT LAYOUT
   ═══════════════════════════════════════ */
body{font-family:var(--font-sans);background:var(--doc-bg);color:var(--doc-text);line-height:1.6;min-height:100vh}
.doc-header{background:#78350f;color:#fff;padding:24px 36px;display:flex;align-items:center;justify-content:space-between;flex-wrap:wrap;gap:12px}
.doc-header h1{font-family:var(--font-serif);font-size:20px;font-weight:700;letter-spacing:.5px}
.doc-header .subtitle{font-size:12px;opacity:.75;margin-top:2px}
.doc-header .meta{font-size:11px;opacity:.6;text-align:right}
.layout{display:flex;gap:0;max-width:1920px;margin:0 auto}

/* Spec Panel */
.spec-panel{width:380px;flex-shrink:0;padding:0 0 80px;overflow-y:auto;max-height:calc(100vh - 72px);position:sticky;top:0;display:flex;flex-direction:column}
.spec-panel::-webkit-scrollbar{width:6px}
.spec-panel::-webkit-scrollbar-thumb{background:var(--doc-border);border-radius:3px}
.spec-section-title{font-size:11px;font-weight:700;color:var(--doc-muted);letter-spacing:3px;text-transform:uppercase;margin:28px 0 12px;padding-left:4px}
.spec-section-title:first-child{margin-top:0}

/* Spec Tabs (5개) */
.spec-tabs{display:flex;background:#FDFCF9;border-bottom:1px solid var(--doc-border);position:sticky;top:0;z-index:10;flex-wrap:nowrap}
.spec-tab{flex:1;padding:12px 4px;font-size:10.5px;font-weight:600;color:var(--doc-muted);cursor:pointer;text-align:center;border-bottom:3px solid transparent;transition:all .15s;background:transparent;border-top:none;border-left:none;border-right:none;font-family:inherit;line-height:1.3;white-space:nowrap}
.spec-tab:hover{color:var(--doc-text);background:rgba(180,83,9,.04)}
.spec-tab.active{color:var(--doc-accent);border-bottom-color:var(--doc-accent);background:#fff}
.spec-tab-body{padding:24px 20px 0}

/* SDS — Overview screen */
.sds-screen{padding:32px 40px;max-width:980px;margin:0 auto;font-family:var(--font-sans);color:var(--app-text);overflow-y:auto}
.sds-screen h2{font-family:var(--font-serif);font-size:24px;font-weight:700;color:var(--app-primary);margin-bottom:6px;display:flex;align-items:center;gap:10px}
.sds-screen .sds-lead{font-size:13px;color:var(--app-text-2);margin-bottom:24px;line-height:1.8}
.sds-section-title{font-family:var(--font-serif);font-size:16px;font-weight:700;color:var(--app-primary);margin:28px 0 12px;padding-bottom:6px;border-bottom:2px solid var(--app-divider)}

.sds-layer-stack{display:flex;flex-direction:column;gap:8px;margin:18px 0}
.sds-layer{border:1.5px solid var(--app-border);border-radius:10px;padding:16px 20px;background:var(--app-surface);position:relative}
.sds-layer-num{position:absolute;left:-12px;top:14px;width:28px;height:28px;border-radius:50%;background:var(--app-primary);color:#fff;display:flex;align-items:center;justify-content:center;font-size:12px;font-weight:700;border:3px solid var(--doc-bg)}
.sds-layer-head{display:flex;align-items:center;gap:10px;margin-bottom:6px;margin-left:24px}
.sds-layer-title{font-size:15px;font-weight:700;color:var(--app-text)}
.sds-layer-pill{font-size:10px;background:var(--app-primary-10);color:var(--app-primary);padding:2px 8px;border-radius:999px;font-weight:600}
.sds-layer-body{margin-left:24px;font-size:12px;color:var(--app-text-2);line-height:1.7}
.sds-layer--persona{border-left:5px solid #d97706;background:linear-gradient(90deg,#fffbeb 0%,#fff 30%)}
.sds-layer--engine{border-left:5px solid #7c3aed;background:linear-gradient(90deg,#faf5ff 0%,#fff 30%)}
.sds-layer--rules{border-left:5px solid #059669;background:linear-gradient(90deg,#f0fdf4 0%,#fff 30%)}
.sds-layer--infra{border-left:5px solid #6b7280;background:linear-gradient(90deg,#f9fafb 0%,#fff 30%)}

.sds-flow-diagram{background:var(--app-surface);border:1px solid var(--app-border);border-radius:10px;padding:18px;margin:14px 0;font-family:'SF Mono',Menlo,monospace;font-size:11px;line-height:1.9;color:var(--app-text);white-space:pre;overflow-x:auto}

.sds-grid-2{display:grid;grid-template-columns:1fr 1fr;gap:12px;margin:14px 0}
.sds-card{background:var(--app-surface);border:1px solid var(--app-border);border-radius:10px;padding:14px 16px}
.sds-card__title{font-size:13px;font-weight:700;color:var(--app-text);margin-bottom:6px}
.sds-card__body{font-size:11.5px;color:var(--app-text-2);line-height:1.7}

/* SDS — AI Engine specific */
.engine-mode-table{width:100%;border-collapse:collapse;font-size:12px;background:var(--app-surface);border:1px solid var(--app-border);border-radius:8px;overflow:hidden;margin:10px 0}
.engine-mode-table th{background:#ede9fe;color:#5b21b6;text-align:left;padding:10px 12px;font-weight:700;font-size:11px;letter-spacing:.5px;border-bottom:1px solid #c4b5fd}
.engine-mode-table td{padding:10px 12px;border-bottom:1px solid var(--app-divider);vertical-align:top;line-height:1.7}
.engine-mode-table tr:last-child td{border-bottom:none}
.engine-mode-table .mode-low{background:#fef9c3;color:#854d0e;font-weight:700;padding:2px 8px;border-radius:4px;font-size:10px;white-space:nowrap}
.engine-mode-table .mode-mid{background:#bae6fd;color:#075985;font-weight:700;padding:2px 8px;border-radius:4px;font-size:10px;white-space:nowrap}
.engine-mode-table .mode-high{background:#fecaca;color:#991b1b;font-weight:700;padding:2px 8px;border-radius:4px;font-size:10px;white-space:nowrap}
.engine-mode-table .mode-nutrient{background:#bbf7d0;color:#14532d;font-weight:700;padding:2px 8px;border-radius:4px;font-size:10px;white-space:nowrap}

.zone-bar{display:flex;border-radius:10px;overflow:hidden;margin:14px 0;border:1px solid var(--app-border);height:80px}
.zone-bar > div{flex:1;padding:12px;font-size:11px;color:#fff;font-weight:600;display:flex;flex-direction:column;justify-content:center;line-height:1.5;text-align:center}
.zone-dormant{background:linear-gradient(135deg,#94a3b8,#64748b)}
.zone-growth{background:linear-gradient(135deg,#10b981,#059669)}
.zone-overload{background:linear-gradient(135deg,#f59e0b,#d97706)}

.constitution-link-card{display:block;background:var(--app-surface);border:1px solid var(--app-border);border-radius:10px;padding:16px 18px;margin-bottom:10px;text-decoration:none;color:var(--app-text);transition:all .15s;border-left:5px solid #888}
.constitution-link-card:hover{box-shadow:0 4px 16px rgba(0,0,0,.08);transform:translateX(2px)}
.constitution-link-card--common{border-left-color:#777}
.constitution-link-card--intro{border-left-color:#2563eb}
.constitution-link-card--body{border-left-color:#059669}
.constitution-link-card--conclusion{border-left-color:#d97706}
.constitution-link-card .clc-head{display:flex;align-items:center;gap:10px;margin-bottom:6px}
.constitution-link-card .clc-emoji{font-size:22px}
.constitution-link-card .clc-title{font-size:15px;font-weight:700}
.constitution-link-card .clc-articles{font-size:11px;color:var(--app-text-3);font-family:'SF Mono',Menlo,monospace;letter-spacing:.5px}
.constitution-link-card .clc-body{font-size:11.5px;color:var(--app-text-2);line-height:1.7;margin-top:4px}
.constitution-link-card .clc-arrow{margin-top:6px;font-size:11px;color:var(--app-primary);font-weight:600}

/* Version table screen */
.version-screen{padding:32px 40px;max-width:880px;margin:0 auto;font-family:var(--font-sans);color:var(--app-text)}
.version-screen h2{font-family:var(--font-serif);font-size:22px;font-weight:700;color:var(--app-primary);margin-bottom:6px}
.version-screen .version-lead{font-size:12px;color:var(--app-text-2);margin-bottom:20px;line-height:1.7}
.version-table{width:100%;border-collapse:collapse;font-size:12px;background:var(--app-surface);border:1px solid var(--app-border);border-radius:8px;overflow:hidden}
.version-table th{background:#f5f0e8;text-align:left;padding:10px 12px;font-weight:700;color:var(--app-text-2);font-size:11px;letter-spacing:.5px;border-bottom:1px solid var(--app-border);white-space:nowrap}
.version-table td{padding:10px 12px;border-bottom:1px solid var(--app-divider);vertical-align:top;line-height:1.7}
.version-table tr:last-child td{border-bottom:none}
.version-table .ver-date{white-space:nowrap;color:var(--app-text-2);font-family:'SF Mono','Menlo',monospace;font-size:11px}
.version-table .ver-num{font-weight:700;color:var(--app-primary);white-space:nowrap}
.version-table .ver-author{white-space:nowrap}
.version-table .ver-reason{font-weight:600}
.version-table .ver-detail ul{padding-left:16px;margin:0}
.version-table .ver-detail li{margin-bottom:3px;color:var(--app-text)}

/* Spec Card */
.spec-card{background:var(--doc-surface);border:1px solid var(--doc-border);border-radius:10px;margin-bottom:10px;overflow:hidden;transition:box-shadow .2s,border-color .2s;cursor:pointer}
.spec-card:hover{box-shadow:0 2px 12px rgba(0,0,0,.06)}
.spec-card.active{border-color:var(--doc-accent);box-shadow:0 0 0 2px rgba(180,83,9,.18)}
.spec-card__head{padding:14px 16px;display:flex;align-items:center;gap:10px}
.spec-card__num{min-width:28px;height:28px;border-radius:50%;background:var(--doc-accent);color:#fff;display:flex;align-items:center;justify-content:center;font-size:10px;font-weight:700;flex-shrink:0;padding:0 4px}
.spec-card__title{flex:1;font-size:13px;font-weight:600}
.spec-card__badge{font-size:9px;font-weight:600;padding:2px 8px;border-radius:var(--app-radius-full);white-space:nowrap}
.spec-card__badge--human{background:#dbeafe;color:#1e40af}
.spec-card__badge--machine{background:#fef3c7;color:#92400e}
.spec-card__badge--both{background:#d1fae5;color:#065f46}
.spec-card__badge--product{background:#f3f4f6;color:#6b7280;border:1px dashed #9ca3af}
.spec-card.product{opacity:.55;border-style:dashed}
.spec-card.product .spec-card__num{background:#9ca3af}
.spec-card__arrow{font-size:12px;color:var(--doc-muted);transition:transform .2s}
.spec-card.open .spec-card__arrow{transform:rotate(90deg)}

.spec-card__body{display:none;padding:0 16px 14px;font-size:12px;line-height:1.7}
.spec-card.open .spec-card__body{display:block}
.spec-detail{margin-bottom:10px}
.spec-detail__label{font-size:10px;font-weight:700;color:var(--doc-muted);letter-spacing:1px;margin-bottom:3px}
.spec-detail ul{padding-left:16px;color:#444}
.spec-detail li{margin-bottom:2px}
.spec-gaps{background:var(--doc-gap-bg);border-left:3px solid var(--doc-gap-border);padding:8px 12px;border-radius:0 6px 6px 0;margin-top:8px}
.spec-gaps__title{font-size:10px;font-weight:700;color:#E65100;letter-spacing:1px;margin-bottom:4px}
.spec-gaps li{color:#BF360C;font-size:11px}
.spec-errors{background:#FEF2F2;border-left:3px solid #DC2626;padding:8px 12px;border-radius:0 6px 6px 0;margin-top:6px}
.spec-errors__title{font-size:10px;font-weight:700;color:#991B1B;letter-spacing:1px;margin-bottom:4px}
.spec-errors li{color:#7F1D1D;font-size:11px}
.spec-route{display:inline-block;font-family:'SF Mono','Menlo','Consolas',monospace;font-size:10px;color:var(--app-primary);background:#EFF6FF;border:1px solid #BFDBFE;padding:2px 6px;border-radius:4px;margin-top:2px;letter-spacing:.3px}
.spec-detail__route-row{display:flex;align-items:center;gap:6px;flex-wrap:wrap;margin-top:2px}

/* Doc cards (UX 원칙, 마이크로카피) */
.spec-card--doc{border-style:dashed;background:linear-gradient(135deg,#FDFCF9 0%,#F0E6D3 100%)}
.spec-card--doc .spec-card__num{background:#7c3aed}
.spec-card__badge--doc{background:#ede9fe;color:#5b21b6}

/* Doc screens (UX 원칙, 마이크로카피 본문) */
.doc-screen{padding:32px 40px;max-width:880px;margin:0 auto;font-family:var(--font-sans);color:var(--app-text);overflow-y:auto;height:100%}
.doc-screen h2{font-family:var(--font-serif);font-size:22px;font-weight:700;color:#5b21b6;margin-bottom:6px;display:flex;align-items:center;gap:10px}
.doc-screen h2 .badge{font-size:10px}
.doc-screen .doc-lead{font-size:12px;color:var(--app-text-2);margin-bottom:24px;line-height:1.7}
.doc-principle{background:var(--app-surface);border:1px solid var(--app-border);border-left:4px solid #7c3aed;border-radius:10px;padding:14px 18px;margin-bottom:10px}
.doc-principle__head{display:flex;align-items:flex-start;gap:10px;margin-bottom:6px}
.doc-principle__num{flex-shrink:0;width:28px;height:28px;border-radius:50%;background:#ede9fe;color:#5b21b6;display:flex;align-items:center;justify-content:center;font-weight:700;font-size:12px}
.doc-principle__title{flex:1;font-size:14px;font-weight:700;color:var(--app-text);line-height:1.4}
.doc-principle__body{font-size:11px;color:var(--app-text-2);line-height:1.7;margin-left:38px}
.doc-principle__body strong{color:var(--app-text)}
.doc-principle__refs{display:flex;flex-wrap:wrap;gap:4px;margin:6px 0 0 38px}
.doc-ref{font-family:'SF Mono','Menlo',monospace;font-size:9px;background:#f3f4f6;color:#5b21b6;padding:2px 7px;border-radius:4px;border:1px solid #e5e7eb;cursor:pointer;transition:background .15s}
.doc-ref:hover{background:#ede9fe}
.doc-section-title{font-family:var(--font-serif);font-size:15px;font-weight:700;color:var(--app-primary);margin:24px 0 10px;padding-bottom:6px;border-bottom:1.5px solid var(--app-divider)}
.doc-table{width:100%;border-collapse:collapse;font-size:11px;margin-bottom:14px;background:var(--app-surface);border:1px solid var(--app-border);border-radius:8px;overflow:hidden}
.doc-table th{background:#f5f0e8;text-align:left;padding:8px 12px;font-weight:700;color:var(--app-text-2);font-size:10px;letter-spacing:.5px;border-bottom:1px solid var(--app-border)}
.doc-table td{padding:8px 12px;border-bottom:1px solid var(--app-divider);vertical-align:top;line-height:1.6}
.doc-table tr:last-child td{border-bottom:none}
.doc-table .col-good{color:#065f46;font-weight:500}
.doc-table .col-bad{color:#991B1B;text-decoration:line-through;opacity:.7}
.doc-callout{background:#f0f7ff;border:1px solid #bfdbfe;border-radius:8px;padding:10px 14px;font-size:11px;color:var(--app-primary);line-height:1.6;margin:8px 0}

/* ═══════════════════════════════════════
   BROWSER PANEL
   ═══════════════════════════════════════ */
.browser-panel{flex:1;min-width:0;padding:0;position:sticky;top:0;height:calc(100vh - 72px);display:flex;flex-direction:column}
.browser-label{display:none}
.browser-frame{width:100%;height:100%;background:#f0f0f0;border-radius:0;overflow:hidden;
  box-shadow:none;border-left:1px solid #c8c4bf;display:flex;flex-direction:column}
.browser-chrome{background:linear-gradient(to bottom,#e8e6e3,#ddd9d5);padding:10px 14px;display:flex;align-items:center;gap:10px;flex-shrink:0;border-bottom:1px solid #c8c4bf}
.browser-dots{display:flex;gap:6px;flex-shrink:0}
.browser-dots .dot{width:12px;height:12px;border-radius:50%}
.dot.red{background:#ff5f57}
.dot.yellow{background:#febc2e}
.dot.green{background:#28c840}
.browser-url{flex:1;background:#fff;border-radius:5px;padding:5px 12px;font-size:11px;color:#666;font-family:monospace;border:1px solid #ccc;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.browser-content{flex:1;overflow-y:auto;overflow-x:hidden;background:var(--app-bg);position:relative;display:flex;flex-direction:column}
.browser-content>*{flex:1;min-height:0}
.browser-content::-webkit-scrollbar{width:5px}
.browser-content::-webkit-scrollbar-thumb{background:#ccc;border-radius:3px}
.browser-nav-info{display:none}

/* ═══════════════════════════════════════
   APP LAYOUT (inside browser)
   ═══════════════════════════════════════ */
.app-shell{display:flex;flex-direction:column;min-height:100%;font-family:var(--font-sans);font-size:13px}
.app-topbar{height:44px;background:var(--app-primary);color:#fff;display:flex;align-items:center;padding:0 16px;gap:10px;flex-shrink:0}
.app-topbar__logo{font-family:var(--font-serif);font-size:14px;font-weight:700;letter-spacing:.5px}
.app-topbar__spacer{flex:1}
.app-topbar__user{font-size:11px;opacity:.85}
.app-topbar__btn{background:rgba(255,255,255,.15);border:none;color:#fff;padding:4px 10px;border-radius:4px;font-size:10px;cursor:pointer;font-family:var(--font-sans)}

.app-body{display:flex;flex:1;min-height:0}
.app-sidebar{width:150px;background:#1a365d;color:#fff;padding:12px 0;flex-shrink:0;overflow-y:auto;font-size:11px}
.app-sidebar__item{padding:8px 16px;cursor:pointer;display:flex;align-items:center;gap:6px;transition:background .15s;white-space:nowrap}
.app-sidebar__item:hover{background:rgba(255,255,255,.08)}
.app-sidebar__item.active{background:rgba(255,255,255,.15);font-weight:700;border-left:3px solid #bee3f8}
.app-sidebar__section{font-size:9px;font-weight:700;color:rgba(255,255,255,.4);padding:12px 16px 4px;letter-spacing:2px;text-transform:uppercase}

.app-main{flex:1;padding:16px 20px;overflow-y:auto;background:var(--app-bg)}
.app-main::-webkit-scrollbar{width:4px}
.app-main::-webkit-scrollbar-thumb{background:#ddd;border-radius:2px}

.app-footer{height:28px;background:#f5f0e8;border-top:1px solid var(--app-border);display:flex;align-items:center;justify-content:center;font-size:9px;color:var(--app-text-3);flex-shrink:0}

/* ═══════════════════════════════════════
   APP COMPONENTS
   ═══════════════════════════════════════ */
.g-header{display:flex;align-items:center;padding:0 0 12px;gap:8px;min-height:32px}
.g-header__back{width:28px;height:28px;border-radius:50%;background:var(--app-primary-10);border:none;cursor:pointer;display:flex;align-items:center;justify-content:center;font-size:14px;color:var(--app-primary);font-family:var(--font-sans);flex-shrink:0}
.g-header__title{flex:1;font-size:15px;font-weight:700;color:var(--app-text)}

.btn{display:inline-flex;align-items:center;justify-content:center;gap:6px;padding:10px 16px;border-radius:var(--app-radius);font-family:var(--font-sans);font-size:12px;font-weight:600;border:none;cursor:pointer;transition:all .15s}
.btn:active{transform:scale(.97)}
.btn--primary{background:var(--app-primary);color:var(--app-primary-fg)}
.btn--outline{background:transparent;border:1.5px solid var(--app-border);color:var(--app-text)}
.btn--ghost{background:transparent;color:var(--app-primary);padding:6px 10px}
.btn--accent{background:var(--app-accent);color:#fff}
.btn--sm{padding:6px 12px;font-size:11px;border-radius:var(--app-radius-sm)}
.btn--danger{background:#fee2e2;color:#dc2626;border:1px solid #fca5a5}
.btn--full{width:100%}

.input{width:100%;padding:8px 12px;border:1.5px solid var(--app-border);border-radius:var(--app-radius-sm);font-family:var(--font-sans);font-size:12px;background:var(--app-surface);color:var(--app-text);outline:none;transition:border-color .15s}
.input:focus{border-color:var(--app-primary)}
.input--area{min-height:80px;resize:none;line-height:1.6}

.card{background:var(--app-surface);border:1px solid var(--app-border);border-radius:var(--app-radius);padding:14px;margin-bottom:8px}
.card--accent{border-color:var(--app-primary);background:var(--app-primary-10)}

.badge{display:inline-block;padding:2px 8px;border-radius:var(--app-radius-full);font-size:9px;font-weight:600}
.badge--blue{background:var(--app-primary-light);color:var(--app-primary)}
.badge--amber{background:#FEFAE0;color:var(--app-accent)}
.badge--gray{background:#F3F4F6;color:var(--app-text-2)}
.badge--green{background:#d1fae5;color:#065f46}
.badge--red{background:#fee2e2;color:#dc2626}
.badge--purple{background:#ede9fe;color:#5b21b6}

.avatar{width:32px;height:32px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:12px;font-weight:700;flex-shrink:0}
.avatar--blue{background:var(--app-primary-light);color:var(--app-primary)}
.avatar--amber{background:#FEFAE0;color:var(--app-accent)}

.divider{height:1px;background:var(--app-divider);margin:10px 0}

.toast{position:absolute;bottom:40px;left:50%;transform:translateX(-50%);background:var(--app-primary);color:#fff;padding:8px 18px;border-radius:var(--app-radius-full);font-size:11px;font-weight:600;z-index:200;animation:toastIn .3s ease;white-space:nowrap}
@keyframes toastIn{from{opacity:0;transform:translateX(-50%) translateY(10px)}to{opacity:1;transform:translateX(-50%) translateY(0)}}
@keyframes fadeIn{from{opacity:0;transform:translateY(4px)}to{opacity:1;transform:none}}

/* Progress bar */
.progress-bar{background:var(--app-border);border-radius:4px;height:6px;overflow:hidden;margin:4px 0}
.progress-bar__fill{height:100%;border-radius:4px;background:var(--app-primary);transition:width .3s}

/* Screen tabs */
.screen-tabs{display:flex;border-bottom:1.5px solid var(--app-divider);margin-bottom:12px}
.screen-tab{flex:1;text-align:center;padding:8px 0;font-size:11px;font-weight:500;color:var(--app-text-3);cursor:pointer;border-bottom:2px solid transparent;margin-bottom:-1.5px;transition:all .15s}
.screen-tab.active{color:var(--app-primary);border-bottom-color:var(--app-primary);font-weight:700}

/* Stats bar */
.stats-bar{display:flex;gap:0;background:var(--app-surface);border:1px solid var(--app-border);border-radius:var(--app-radius);margin-bottom:12px;overflow:hidden}
.stats-bar__item{flex:1;text-align:center;padding:8px 4px;border-right:1px solid var(--app-divider)}
.stats-bar__item:last-child{border-right:none}
.stats-bar__num{font-size:16px;font-weight:700;color:var(--app-primary)}
.stats-bar__label{font-size:8px;color:var(--app-text-2);margin-top:1px}

/* Block bar */
.block-bar{display:flex;gap:3px;padding:6px 0;margin-bottom:8px;align-items:center}
.block-step{padding:6px 10px;font-size:10px;font-weight:600;border-radius:6px;cursor:pointer;transition:all .15s;border:1.5px solid var(--app-border);background:var(--app-surface);color:var(--app-text-2);text-align:center}
.block-step.active{background:var(--app-primary);color:#fff;border-color:var(--app-primary)}
.block-step.done{background:var(--app-primary-10);color:var(--app-primary);border-color:var(--app-primary)}
.block-step.add{border-style:dashed;color:var(--app-text-3);font-size:14px;padding:4px 10px}
.block-arr{color:#ccc;font-size:10px}

/* Accordion */
.accordion{border:1px solid var(--app-border);border-radius:var(--app-radius);overflow:hidden;margin-bottom:8px}
.accordion__head{padding:10px 14px;background:var(--app-surface);cursor:pointer;display:flex;align-items:center;gap:8px;font-size:12px;font-weight:600;transition:background .15s}
.accordion__head:hover{background:#f8f6f2}
.accordion__arrow{font-size:10px;color:var(--app-text-3);transition:transform .2s;margin-left:auto}
.accordion.open .accordion__arrow{transform:rotate(90deg)}
.accordion__body{display:none;padding:10px 14px;font-size:11px;border-top:1px solid var(--app-divider);background:#fdfcfa}
.accordion.open .accordion__body{display:block}

function openConstitution(id) {
  currentConstitutionId = id;
  renderConstitutionSide();
  if (id === 'overview') {
    nav('sds-constitution');
  } else {
    nav('sds-constitution-viewer');
  }
}

function openConstitutionInNewWindow() {
  if (currentConstitutionId === 'overview') return;
  const f = CONSTITUTION_FILES.find(x => x.id === currentConstitutionId);
  if (f) window.open(CONSTITUTION_BASE + f.file, '_blank');
}

    <div class="spec-card spec-card--doc" id="spec-ux-principles" onclick="handleSpecClick('ux-principles')">
      <div class="spec-card__head">
        <div class="spec-card__num">UX</div>
        <div class="spec-card__title">UX \uC6D0\uCE59 (10\uAC1C)</div>

      </div>

        <div class="spec-detail"><div class="spec-detail__label">\uBAA9\uC801</div><ul><li>\uC77C\uAD00\uC131\uC758 \uADFC\uAC70 \uC81C\uACF5 \u2014 \uD654\uBA74 \uC124\uACC4 \uACB0\uC815 \uC2DC \uCC38\uC870</li><li>\uAC01 \uC6D0\uCE59 \u2192 \uC801\uC6A9 \uD654\uBA74 \uC5ED\uCC38\uC870</li></ul></div>
      </div>
    </div>

        <div class="spec-card__num">MC</div>
        <div class="spec-card__title">\uB9C8\uC774\uD06C\uB85C\uCE74\uD53C \uAC00\uC774\uB4DC</div>
        <span class="spec-card__badge spec-card__badge--doc">\uBB38\uC11C</span>
        <span class="spec-card__arrow">\u25B6</span>
      </div>
      <div class="spec-card__body">
        <div class="spec-detail"><div class="spec-detail__label">\uBAA9\uC801</div><ul><li>\uD1A4 \u00B7 \uC6A9\uC5B4 \u00B7 \uBB38\uAD6C \uD45C\uC900\uD654</li><li>\uC5ED\uD560\uBCC4 \uD638\uCE6D, \uC2DC\uC81C, \uC608\uC678 \uCC98\uB9AC</li></ul></div>

    </div>
    <div class="spec-card spec-card--doc" id="spec-socrates-character" onclick="handleSpecClick('socrates-character')">
      <div class="spec-card__head">
        <div class="spec-card__num">SC</div>
        <div class="spec-card__title">\uC18C\uD06C\uB77C\uD14C\uC2A4 \uCE90\uB9AD\uD130</div>
        <span class="spec-card__badge spec-card__badge--doc">\uBB38\uC11C</span>
        <span class="spec-card__arrow">\u25B6</span>
      </div>
      <div class="spec-card__body">
        <div class="spec-detail"><div class="spec-detail__label">\uBAA9\uC801</div><ul><li>\uC57C\uB9CC\uC2A4 \uCE90\uB9AD\uD130 \uC678\uC591 \u00B7 \uD45C\uC815 \u00B7 \uC131\uACA9 \uC815\uC758</li><li>\uC11C\uB860/\uBCF8\uB860/\uACB0\uB860 \uBE14\uB85D\uBCC4 \uB300\uC0AC \uD45C\uC900\uD654</li><li>\uC77C\uB7EC\uC2A4\uD2B8 \uC81C\uC791 \u00B7 \uBCF4\uC774\uC2A4 \uB179\uC74C \uAC00\uC774\uB4DC</li></ul></div>

      currentGroup = s.group;

               s.badgeType === 'machine' ? 'spec-card__badge--machine' :

        <span class="spec-card__arrow">\u25B6</span>

        <div class="spec-gaps"><div class="spec-gaps__title">\u26A0 \uAE30\uD68D \uBBF8\uACB0\uC815 (${s.gaps.length}\uAC74)</div><ul>${s.gaps.map(g=>'<li>'+g+'</li>').join('')}</ul></div>
        ${errorsHtml}
      </div>
    </div>`;
  });
  document.getElementById('specPanel').innerHTML = html;
}

function handleSpecClick(id) {
  const card = document.getElementById('spec-' + id);
  const wasOpen = card.classList.contains('open');
  card.classList.toggle('open');
  if (!wasOpen) nav(id);
}

function highlightSpec(id) {
  document.querySelectorAll('.spec-card').forEach(c => c.classList.remove('active'));
  const el = document.getElementById('spec-' + id);
  if (el) {
    el.classList.add('active');
    el.scrollIntoView({ behavior: 'smooth', block: 'nearest' });
  }
}

/* ═══════════════════════════════════════
   NAVIGATION
   ═══════════════════════════════════════ */
function nav(id, replace) {
  if (!replace && state.screen) navHistory.push(state.screen);
  state.screen = id;
  render();
  highlightSpec(id);
  updateNavInfo();
  updateUrl(id);
}
function goBack() {
  const prev = navHistory.pop();
  if (prev) { state.screen = prev; render(); highlightSpec(prev); updateNavInfo(); updateUrl(prev); }
}
function render() {
  const area = document.getElementById('screenArea');
  const renderer = SCREENS[state.screen];
  if (renderer) { area.innerHTML = renderer(); area.scrollTop = 0; }
}
function updateNavInfo() {
  const docTitles = {
    'ux-principles':'UX \uC6D0\uCE59 (10\uAC1C)',
    'microcopy':'\uB9C8\uC774\uD06C\uB85C\uCE74\uD53C \uAC00\uC774\uB4DC',
    'socrates-character':'\uC18C\uD06C\uB77C\uD14C\uC2A4 \uCE90\uB9AD\uD130 \uAC00\uC774\uB4DC',
    'doc-version':'\uBB38\uC11C \uBC84\uC804 \uAD00\uB9AC',
    'sds-overview':'\uC2DC\uC2A4\uD15C \uAC1C\uC694 (4\uACC4\uCE35 \uC544\uD0A4\uD14D\uCC98)',
    'sds-engine':'AI \uC5D4\uC9C4 \uBA85\uC138 (\uC2A4\uD504\uB77C\uC6B0\uD305 \uC5D4\uC9C4)',
    'sds-constitution':'\uD5CC\uBC95 (\uC8FC\uC7A5\uAE00\uC4F0\uAE30 \uADDC\uCE59)',
    'sds-constitution-viewer':'\uD5CC\uBC95 \uBDF0\uC5B4',
    'sds-llm-policy':'LLM \uB3D9\uC791 \uC815\uCC45\uC11C (\uBDF0\uC5B4)'
  };
  const el = document.getElementById('navInfo');
  if (docTitles[state.screen]) { el.innerHTML = '\uD604\uC7AC: <span>' + docTitles[state.screen] + '</span>'; return; }
  const spec = SPECS.find(s => s.id === state.screen);
  if (spec) el.innerHTML = '\uD604\uC7AC: <span>' + spec.num + '. ' + spec.title + '</span>';
}
function updateUrl(id) {
  const docMap = {
    'ux-principles':'docs/ux-principles',
    'microcopy':'docs/microcopy',
    'socrates-character':'docs/socrates-character',
    'doc-version':'docs/version-history',
    'sds-overview':'sds/overview',
    'sds-engine':'sds/engine',
    'sds-constitution':'sds/constitution',
    'sds-constitution-viewer': (() => {
      const f = CONSTITUTION_FILES.find(x => x.id === currentConstitutionId);
      return 'sds/constitution/' + (f ? f.id : 'overview');
    })(),
    'sds-llm-policy':'sds/llm-policy'
  };
  if (docMap[id]) { document.getElementById('urlPath').textContent = docMap[id]; return; }
  const spec = SPECS.find(s => s.id === id);
  // SPECS의 route를 우선 사용 (선두 슬래시 제거)
  const path = spec && spec.route ? spec.route.replace(/^\//,'') : id;
  document.getElementById('urlPath').textContent = path;
}

function showToast(msg) {
  const area = document.getElementById('screenArea');
  const t = document.createElement('div');
  t.className = 'toast'; t.textContent = msg;
  area.appendChild(t); setTimeout(() => t.remove(), 2000);
}

function tcSidebar(active) {
  const items = [
    {id:'tc-rules', icon:'\uD83D\uDCDC', label:'\uADDC\uCE59 \uC124\uC815'},
    {id:'tc-monitor', icon:'\uD83D\uDCCA', label:'\uBAA8\uB2C8\uD130\uB9C1'},
    {id:'tc-report', icon:'\uD83D\uDCC4', label:'\uB9AC\uD3EC\uD2B8'}
  ];
  let h = '<div class="app-sidebar__section">\uC120\uC0DD\uB2D8 \uBA54\uB274</div>';
  items.forEach(i => {
    h += '<div class="app-sidebar__item'+(i.id===active?' active':'')+'" onclick="nav(\''+i.id+'\')">'+i.icon+' '+i.label+'</div>';

  const sidebar = opts.sidebar ? '<div class="app-sidebar">'+opts.sidebar+'</div>' : '';
  const footer = '<div class="app-footer">Annoying Socrates: Argument Writing Edition v2.0 | Powered by Claude</div>';
  return '<div class="app-shell">'
    + topbar
    + '<div class="app-body">'
    + sidebar
    + '<div class="app-main" style="'+(opts.mainStyle||'')+'">' + content + '</div>'

// ═══ SCR-ST-01: 주장글쓰기 (핵심 화면) ═══
'st-write': () => {
  const blocks = ['\uC11C\uB860'];
  for (let i = 1; i <= state.totalBodyBlocks; i++) blocks.push('\uBCF8\uB860 '+i);
  blocks.push('\uACB0\uB860');

  // 본론 '+' 버튼은 본론 블록 묶음 옆에만 위치 (서론/결론 사이의 본론 그룹 끝)
  const blockBarHtml = '<div class="block-bar" style="flex-wrap:wrap">'
    + blocks.map((b,i) => {
        let cls = i < state.currentBlock ? 'done' : i === state.currentBlock ? 'active' : '';
        const isLastBody = (i >= 1) && (i === state.totalBodyBlocks);
        let icon = i === 0 ? '\uD83D\uDCD6 ' : i === blocks.length-1 ? '\u{1F3C1} ' : '\u270D\uFE0F ';
        return '<div class="block-step '+cls+'" onclick="state.currentBlock='+i+';state.feedbackLeft=3;render()">'+icon+b+'</div>'
          + (isLastBody ? '<button class="block-step add" onclick="state.totalBodyBlocks++;state.currentBlock='+(state.totalBodyBlocks+1)+';render()" title="\uBCF8\uB860 \uBB38\uB2E8 \uCD94\uAC00" style="background:#eff6ff;border-color:#bfdbfe;color:var(--app-primary);font-weight:700;cursor:pointer">\u2795 \uBCF8\uB860</button>' : '')
          + (i < blocks.length-1 ? '<span class="block-arr">\u25B8</span>' : '');
      }).join('')
    + '</div>';

  const currentBlockName = blocks[state.currentBlock];
  const isIntro = state.currentBlock === 0;
  const isConclusion = state.currentBlock === blocks.length - 1;
  const blockKey = isIntro ? 'intro' : isConclusion ? 'conclusion' : 'body';
  const blockEmoji = isIntro ? '\uD83D\uDCD6' : isConclusion ? '\u{1F3C1}' : '\u270D\uFE0F';

  const placeholders = isIntro
    ? '\uC5EC\uAE30\uC5D0 \uC11C\uB860\uC744 \uC368\uBCF4\uC790...\n\n\uBB34\uC2A8 \uBB38\uC81C\uC778\uC9C0 \uBC1D\uD788\uACE0, \uB098\uC758 \uC8FC\uC7A5\uC744 \uD55C \uBB38\uC7A5\uC73C\uB85C \uB098\uD0C0\uB0B4\uBCF4\uC790.'
    : isConclusion
    ? '\uC5EC\uAE30\uC5D0 \uACB0\uB860\uC744 \uC368\uBCF4\uC790...\n\n\uBCF8\uB860\uC744 \uAE54\uB054\uD788 \uC694\uC57D\uD558\uACE0, \uD380\uCE58\uB77C\uC778\uC73C\uB85C \uB9C8\uBB34\uB9AC\uD558\uC790.'
    : '\uC5EC\uAE30\uC5D0 \uBCF8\uB860\uC744 \uC368\uBCF4\uC790...\n\n\uC911\uC2EC \uBB38\uC7A5 \u2192 \uB4B7\uBC1B\uCE68(\uC608\uC2DC \u00B7 \uBE44\uC720 \u00B7 \uAE4C\uB2ED) \uC21C\uC11C\uB85C.';

  const sampleText = state.currentBlock === 0
    ? '\uCD5C\uADFC \uC6B0\uB9AC \uD559\uAD50\uC5D0\uC11C\uB294 \uAE09\uC2DD \uC2DC\uAC04\uC5D0 \uC74C\uC2DD\uC744 \uBC84\uB9AC\uB294 \uD559\uC0DD\uB4E4\uC774 \uB9CE\uC544\uC9C0\uACE0 \uC788\uC2B5\uB2C8\uB2E4. \uD658\uACBD\uBD80\uC5D0 \uB530\uB974\uBA74 \uD559\uAD50 \uAE09\uC2DD \uC794\uBC18\uB7C9\uC740 \uC5F0\uAC04 \uC57D 7\uB9CC \uD1A4\uC5D0 \uB2EC\uD558\uBA70, \uC774\uB294 \uC2EC\uAC01\uD55C \uD658\uACBD \uBB38\uC81C\uB97C \uCD08\uB798\uD558\uACE0 \uC788\uC2B5\uB2C8\uB2E4.'
    : '';

  // 소크라테스 캐릭터 아바타 (이모지 자리표시 - 실제 이미지로 교체 예정)
  const socratesAvatar = (size) => {
    size = size || 56;
    return '<div style="flex-shrink:0;width:'+size+'px;height:'+size+'px;border-radius:50%;background:linear-gradient(135deg,#fef3c7 0%,#fde68a 100%);border:2px solid #d97706;display:flex;align-items:center;justify-content:center;font-size:'+(size*0.55)+'px;position:relative">\u{1F9D4}<div style="position:absolute;bottom:-4px;right:-4px;background:#7c3aed;color:#fff;font-size:'+(size*0.2)+'px;width:'+(size*0.32)+'px;height:'+(size*0.32)+'px;border-radius:50%;display:flex;align-items:center;justify-content:center;border:1.5px solid #fff">\u{1F60F}</div></div>';
  };

  // 현재 블록의 소크라테스 멘트 (피드백 사용량에 따라 다른 멘트 노출)
  const lines = SOCRATES_LINES[blockKey];
  const usedFeedback = 3 - state.feedbackLeft;
  const visibleLines = lines.slice(0, Math.max(1, usedFeedback)); // 최소 1개는 항상 노출

  const speechBubbles = visibleLines.map((l,idx) => `
    <div style="display:flex;gap:10px;margin-bottom:10px;animation:fadeIn .3s ease ${idx*0.05}s both">

// ═══ SDS: AI 엔진 명세 (스프라우팅 엔진) ═══
'sds-engine': () => {
  return `<div class="sds-screen">
    <h2>🤖 AI 엔진 명세 — 스프라우팅 엔진</h2>
    <div class="sds-lead">
      <strong>핵심 비유</strong>: 생물학적 발아 — 씨앗(Seed) + 토양(Soil) → 새싹(Sprout). 학습자의 굳어 있는, 미숙고된 지식의 씨껍질을 파열시키는 <em>자극적 질문</em>을 공급하는 시스템. 비고츠키의 ZPD 안에서 <strong>마찰</strong>을 생성하되, 뿌리 체계를 파괴하지 않는 보정된 압력을 유지한다.
    </div>

    <div class="sds-section-title">3.1 씨앗·토양·새싹 프레임워크</div>
    <div class="sds-grid-2" style="grid-template-columns:1fr 1fr 1fr">
      <div class="sds-card" style="border-left:4px solid #d97706"><div class="sds-card__title">🌰 씨앗 (Seed)</div><div class="sds-card__body">학습자 상태 변수 = <strong>지식 깊이 + 호기심 지수</strong>. 측정 시 <code>S_seed</code>로 표기.</div></div>
      <div class="sds-card" style="border-left:4px solid #059669"><div class="sds-card__title">🌍 토양 (Soil)</div><div class="sds-card__body">학습 환경 / 컨텍스트. 본 시스템에서는 헌법(분리편) + 학생의 누적 작성 이력.</div></div>
      <div class="sds-card" style="border-left:4px solid #2563eb"><div class="sds-card__title">🌱 새싹 (Sprout)</div><div class="sds-card__body">목표 산출 = <strong>새 질문 생성 또는 아포리아 도달</strong>. 발아가 진행되고 있다는 일차 지표.</div></div>
    </div>

    <table class="engine-mode-table" style="margin-top:18px">
      <thead><tr><th style="width:30%">속성</th><th>정의</th></tr></thead>
      <tbody>
        <tr><td><strong>AI 개입 변수</strong></td><td>압력(Pressure) = 질문의 깊이/폭. 너무 얕으면 씨앗에 가닿지 못하고, 너무 깊으면 뿌리를 파괴한다.</td></tr>
        <tr><td><strong>실패 프레이밍</strong></td><td>뿌리 썩음(과도한 깊이) / 표면 물주기(질문이 너무 피상적)</td></tr>
        <tr><td><strong>안전 장치</strong></td><td>영양(Nutrient) 모드 — 정서적 곤란 감지 시 작동, 메타인지적 비계만 공급</td></tr>
        <tr><td><strong>이론적 토대</strong></td><td>비고츠키 ZPD (1978) · 칙센트미하이 Flow (1990) · Bandura 자기효능감 (2001) · Just-in-Time Teaching (Novak, 1999)</td></tr>
      </tbody>
    </table>

    <div class="sds-section-title">3.2 1단계 — 독립적 정착 (Independent Anchoring)</div>
    <div class="sds-lead" style="margin-bottom:14px">
      각 학습자는 스프라우팅 엔진과 1:1 대화에 참여한다. 시스템은 다음 4 신호를 분석해 <code>S_seed</code>를 추정한다.
    </div>
    <div class="sds-grid-2">
      <div class="sds-card"><div class="sds-card__title">신호 1 — 질문 복잡도</div><div class="sds-card__body">학생이 던지는 질문의 추상도, 메타 수준, 다층성</div></div>
      <div class="sds-card"><div class="sds-card__title">신호 2 — 논변 구조</div><div class="sds-card__body">중심 문장-뒷받침-결론의 명시성, 논리 사슬의 완성도</div></div>
      <div class="sds-card"><div class="sds-card__title">신호 3 — 자기수정 에피소드</div><div class="sds-card__body">학생이 스스로 이전 글을 고치는 빈도와 깊이</div></div>
      <div class="sds-card"><div class="sds-card__title">신호 4 — 불확실성 표현 빈도</div><div class="sds-card__body">"~인 것 같다", "~일 수도 있다" 등 메타인지적 마커</div></div>
    </div>

    <div class="sds-section-title">발아 모드 (S_seed 수준에 따른 전략)</div>
    <table class="engine-mode-table">
      <thead>
        <tr><th style="width:13%">수준</th><th style="width:30%">교육적 기능</th><th>전략</th></tr>
      </thead>
      <tbody>
        <tr>

          <td>과제 분절화; 미세 발견(micro-discovery) 축하; 안내된 탐침; 무제한 후속 힌트</td>
        </tr>
        <tr>
          <td><span class="mode-mid">Mid</span></td>
          <td>비계 기반 탐구에서 자기 주도 탐구로의 이행</td>
          <td>추론 구조 점검; 근거 요구; 반례 도입; 안내된 탐침</td>
        </tr>
        <tr>
          <td><span class="mode-high">High</span></td>
          <td>안주(complacency) 교란; 지식 환상의 폭로; 뿌리 체계 심화</td>
          <td>근거 심문; 아포리아 유도; 논리적 스파링; 레드팀 자세</td>
        </tr>
      </tbody>
    </table>

    <div class="sds-section-title">아포리아 (Aporia) — 발아의 일차 지표</div>
    <div class="doc-callout" style="background:#faf5ff;border:1px solid #d8b4fe;border-radius:8px;padding:12px 16px;font-size:12px;color:#5b21b6;line-height:1.8">
      <strong>아포리아</strong> = '안다고 생각했지만 설명하지 못함'이라는 자각된 무지의 소크라테스적 상태. 학습자가 아포리아에 도달하면 시스템은 <strong>즉시 영양 모드(Nutrient Mode)로 전환</strong>한다. 이 모드에서 시스템은 답을 제공하지 않고 메타인지적 비계만을 공급함으로써, 학습자가 새싹을 저항이 큰 토양 위로 밀어 올리는 <em>'생산적 분투(productive struggle)'</em>를 직접 체험하도록 한다.
    </div>

    <div class="sds-section-title">SMM 훈련장으로서의 1:1 스파링</div>
    <div class="sds-lead">
      이 엔진은 단지 개인의 지식 획득만을 위한 것이 아니라 <strong>내적 논리의 외재화 연습</strong>을 위한 것이기도 하다. 학습자는 AI의 적대적 탐침에 맞서 자신의 논변을 방어하면서 <strong>'정의적 격차(definitional gap)'</strong>를 식별하고 메우는 법을 배우며, 이 능력은 인간 대 인간 협력에 그대로 전이된다. 1:1 '논리적 스파링'은 후속 단계의 팀 종합(2단계) 및 실세계 집단 문제 해결에서 정신 모델을 효과적으로 동기화하는 데 요구되는 메타인지적 근육을 단련한다.
    </div>

    <div class="sds-section-title">3.3 안전 장치 — 3개 운영 상태</div>
    <div class="zone-bar">
      <div class="zone-dormant">
        🛌 휴면대 (Dormant)<br>
        <span style="font-size:9px;font-weight:400;opacity:.9">S_seed &lt; 임계치<br>학습된 무력감 방지<br>추진력 모드 기본값</span>
      </div>
      <div class="zone-growth">
        🌱 성장대 (Growth)<br>
        <span style="font-size:9px;font-weight:400;opacity:.9">최적 범위<br>ZPD + Flow 채널<br>보정된 질문 압력 유지</span>
      </div>
      <div class="zone-overload">
        🔥 과부하대 (Overload)<br>
        <span style="font-size:9px;font-weight:400;opacity:.9">정서적 곤란 감지<br>영양 모드 활성<br>정서적 인정 → 도전 복귀</span>
      </div>
    </div>

      <tbody>
        <tr>
          <td><strong>휴면대</strong></td>
          <td>S_seed가 임계치 미만</td>
          <td>학습된 무력감을 방지하기 위해 <strong>추진력 모드</strong>를 기본값으로 둠. Low 발아 모드와 결합.</td>
        </tr>
        <tr>
          <td><strong>성장대</strong></td>
          <td>S_seed가 최적 범위</td>
          <td>ZPD 및 칙센트미하이 'Flow 채널'에 대응되는 <strong>보정된 질문 압력 유지</strong>. Mid/High 발아 모드와 결합.</td>
        </tr>

          <td><strong>과부하대</strong></td>

    <div class="sds-section-title">Appeal 시스템 — 발달 안전 장치</div>
    <div class="doc-callout" style="background:#fffbeb;border:1px solid #fcd34d;border-radius:8px;padding:14px 18px;font-size:12px;color:#78350f;line-height:1.8">
      학습자는 스프라우팅 엔진의 어떤 반박에도 반론을 제시할 수 있다. 시스템이 <code style="background:#fef3c7;padding:2px 6px;border-radius:3px">appeal_judge</code> 도구를 통해 학습자의 반론이 논리적으로 타당하다고 판단하면, <strong>마찰은 일시적으로 감소되고 시스템은 학습자의 '승리'를 명시적으로 축하한다</strong>. 이는 '논변은 출처(인간이든 AI이든)가 아니라 그 자체의 가치로 평가받는다'는 인식론적 입장을 모델링한다. 초등 학습자에게 이 경험은 정교한 대화 상대를 지적으로 이긴다는 정서적 체험을 함께 제공하며, 이는 <strong>자기효능감 발달(Bandura, 2001)</strong>을 직접적으로 지원한다.
    </div>

    <div class="sds-section-title">2단계 — 협력적 종합 (본 프로토타입 제외)</div>
    <div class="doc-callout" style="background:#f3f4f6;border:1px dashed #9ca3af;border-radius:8px;padding:14px 18px;font-size:12px;color:#4b5563;line-height:1.8">
      ⏸ <strong>P14 후속 연구 과제로 분리.</strong> 개별 씨앗 정착이 끝나면 학습자들은 팀 토론에 진입하며, 스프라우팅 엔진은 <em>공동체의 정원사(Community Gardener)</em>로 기능한다. 팀원 간 정의적 불일치(SMM 격차)를 표면으로 끌어올리고, 탐색적 논쟁을 촉진하며, 비인간 페르소나를 활용해 비판적 탐침이 만드는 사회적 비용을 '대신 흡수'한다.<br><br>
      <strong>본 프로토타입 v3.0은 1단계(독립적 정착)만 구현한다.</strong> 화면명세서의 팀 챌린지(TM-00 ~ TM-04) 화면들은 인터페이스 골격만 유지하며, AI 엔진의 2단계 동작 정의 · Community Gardener 모드 · SMM 정렬도 산출 로직은 후속 연구로 분리한다.
    </div>

    <div class="sds-section-title">페르소나 결합 — 소크라테스로 출력</div>
    <div class="sds-lead">
      엔진이 결정한 (발아 모드 + 신호 ID + 학생 작성 텍스트)는 페르소나 계층에서 <strong>소크라테스 표준 대사</strong>로 변환된다. 표준 대사는 헌법 분리편의 평가 체크리스트에 신호 ID 단위로 매핑되어 있으며, 페르소나 캐릭터 가이드(외양 · 성격 · 톤)는 <code>socrates-character</code> 문서에 정의되어 있다.
    </div>

      <td class="ver-num">${v.version}</td>
